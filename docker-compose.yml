services:
  mysql:
    image: mysql:8.0
    container_name: ec_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ec_db
      MYSQL_USER: ec_user
      MYSQL_PASSWORD: ec_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ec_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
